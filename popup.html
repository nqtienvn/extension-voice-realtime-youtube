<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Caption Voice</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <label class="toggle">
        <input id="enabled" type="checkbox" />
        <span>Đọc phụ đề</span>
      </label>

      <label>
        Tốc độ <output id="rateValue" for="rate"></output>
        <input id="rate" type="range" min="0.75" max="3" step="0.05" />
      </label>

      <label>
        Giọng đọc
        <select id="voice">
          <option value="">Tự động chọn giọng tiếng Việt (vi-VN)</option>
        </select>
      </label>
      <p id="voiceHint"></p>

      <p>
        Phụ đề được đọc tuần tự; khi FIFO tồn đọng, extension tự tăng nhẹ tốc
        độ để bám sát video.
      </p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
