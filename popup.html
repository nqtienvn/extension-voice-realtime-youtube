<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Caption Voice</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <label class="toggle">
        <input id="enabled" type="checkbox" />
        <span>Đọc phụ đề</span>
      </label>

      <label>
        Tốc độ <output id="rateValue" for="rate"></output>
        <input id="rate" type="range" min="0.75" max="3" step="0.05" />
      </label>

      <label>
        Giọng đọc
        <select id="voice">
          <option value="">Tự động — ưu tiên giọng tiếng Việt (vi-VN)</option>
        </select>
      </label>
      <p id="voiceHint"></p>

      <p>
        Phụ đề được đọc tuần tự; khi FIFO tồn đọng, extension tự tăng nhẹ tốc
        độ để bám sát video.
      </p>

      <section class="transcript" aria-labelledby="transcriptTitle">
        <h2 id="transcriptTitle">Ghi phụ đề</h2>
        <p id="transcriptStatus" aria-live="polite">
          Đang kết nối với video…
        </p>
        <div class="transcript-actions">
          <button id="transcriptButton" type="button" disabled>
            Bắt đầu ghi
          </button>
          <button
            id="transcriptDownload"
            class="secondary"
            type="button"
            disabled
          >
            Tải TXT
          </button>
        </div>
        <p>
          Chỉ ghi phụ đề xuất hiện từ lúc bạn bấm bắt đầu. Nội dung được giữ
          trong tab và không gửi ra mạng.
        </p>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
